<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tréninkové tabulky - MyMCD</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/tables.css">
</head>
<body>
    <div class="app-container no-print">
        <header class="glass-panel main-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">📋</div>
                    <h1>Tréninkové tabulky</h1>
                </div>
                <div class="header-actions">
                    <a href="/" class="btn btn-secondary">Zpět na Dashboard</a>
                    <button class="btn btn-primary" onclick="window.print()">🖨️ Tisk / Uložit PDF</button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('tab-crew-trenink')">Crew v tréninku</button>
                <button class="tab-btn" onclick="switchTab('tab-crew')">Crew</button>
                <button class="tab-btn" onclick="switchTab('tab-nocni')">Noční</button>
                <button class="tab-btn tab-hidden" onclick="switchTab('tab-hidden')">Skrytí zaměstnanci (<span id="hidden-count">0</span>)</button>
            </div>
            
            <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1rem;">
                <button id="add-to-nocni-btn" class="btn hidden" onclick="toggleNocniModal()">+ Přidat do Noční</button>
                <button id="add-custom-btn" class="btn btn-secondary" onclick="addCustomEmployee()">+ Vlastní zaměstnanec</button>
                <button id="sync-verifs-btn" class="btn btn-primary" onclick="syncVerifications()">🔄 Synchronizovat verifikace</button>
                <span id="last-sync-time" style="align-self: center; font-size: 0.85rem; color: #aaa;"></span>
            </div>
        </header>
    </div>

    <!-- Modals -->
    <div id="nocni-modal" class="modal hidden no-print">
        <div class="modal-content glass-panel">
            <h2>Přidat do Noční</h2>
            <div class="nocni-search">
                <input type="text" id="nocni-search-input" placeholder="Hledat jméno..." oninput="filterNocniList()">
            </div>
            <div id="nocni-employee-list" class="employee-list">
                <!-- checkmarks populated here -->
            </div>
            <button class="btn btn-primary" onclick="toggleNocniModal()">Zavřít</button>
        </div>
    </div>

    <!-- Print / Table Area -->
    <div class="print-container">
        <!-- 1: Crew v treninku -->
        <div id="tab-crew-trenink" class="table-section active">
            <div class="paper-table-wrapper">
                <table class="tracker-table" id="table-crew-trenink">
                    <!-- generated by JS -->
                </table>
            </div>
        </div>

        <!-- 2: Crew -->
        <div id="tab-crew" class="table-section hidden">
            <div class="paper-table-wrapper">
                <table class="tracker-table" id="table-crew">
                    <!-- generated by JS -->
                </table>
            </div>
        </div>

        <!-- 3: Nocni -->
        <div id="tab-nocni" class="table-section hidden">
            <div class="paper-table-wrapper">
                <table class="tracker-table nocni-table" id="table-nocni">
                    <!-- generated by JS -->
                </table>
            </div>
        </div>
        
        <!-- 4: Hidden -->
        <div id="tab-hidden" class="table-section hidden no-print">
            <div class="table-title">SKRYTÍ ZAMĚSTNANCI</div>
            <div class="paper-table-wrapper">
                <ul id="hidden-list" class="hidden-ul">
                    <!-- generated by js -->
                </ul>
            </div>
        </div>
    </div>

    <script src="/static/js/tables.js"></script>
</body>
</html>
